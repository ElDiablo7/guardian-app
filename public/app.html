<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>GRACE-X Guardian • Security Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css" />
    <script>
        // Legacy app.html — redirect to correct tier dashboard via server session
        (async () => {
            try {
                const res = await fetch('/api/session', { credentials: 'include' });
                const data = await res.json();
                if (data.authenticated && data.tier) {
                    window.location.href = '/dashboard-' + data.tier + '.html';
                } else {
                    window.location.href = '/login.html';
                }
            } catch (e) {
                window.location.href = '/';
            }
        })();
    </script>
</head>

<body>
    <div class="fx-bg fx-bg--hard"></div>
    <div
        style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: var(--mono); gap: 20px;">
        <div class="health-node" style="width: 40px; height: 40px;"></div>
        <div style="color: var(--cyan); font-size: 11px; text-transform: uppercase; letter-spacing: 2px;">
            Authenticating Guardian Node...
        </div>
    </div>
</body>

</html>
